<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenClaw – API Test</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --border: #2a2d3a;
  --primary: #6c5ce7;
  --primary-hover: #7c6ef7;
  --text: #e2e4ea;
  --text-dim: #8b8fa3;
  --user-bg: #2d2a4a;
  --assistant-bg: #1e2130;
  --error: #e74c3c;
  --success: #2ecc71;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100dvh;
  display: flex;
  flex-direction: column;
}

/* ── Login ── */
#login-screen {
  display: flex;
  align-items: center;
  justify-content: center;
  flex: 1;
  padding: 1rem;
}

.login-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 2rem;
  width: 100%;
  max-width: 380px;
}

.login-card h1 {
  font-size: 1.5rem;
  margin-bottom: 0.25rem;
}

.login-card p {
  color: var(--text-dim);
  font-size: 0.85rem;
  margin-bottom: 1.5rem;
}

.tabs {
  display: flex;
  gap: 0;
  margin-bottom: 1.5rem;
  border-bottom: 1px solid var(--border);
}

.tabs button {
  flex: 1;
  background: none;
  border: none;
  color: var(--text-dim);
  padding: 0.6rem;
  cursor: pointer;
  font-size: 0.9rem;
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
}

.tabs button.active {
  color: var(--primary);
  border-bottom-color: var(--primary);
}

.field {
  margin-bottom: 1rem;
}

.field label {
  display: block;
  font-size: 0.8rem;
  color: var(--text-dim);
  margin-bottom: 0.3rem;
}

.field input {
  width: 100%;
  padding: 0.65rem 0.75rem;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-size: 0.95rem;
  outline: none;
  transition: border-color 0.2s;
}

.field input:focus {
  border-color: var(--primary);
}

.btn {
  width: 100%;
  padding: 0.7rem;
  background: var(--primary);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 0.95rem;
  cursor: pointer;
  transition: background 0.2s;
  margin-top: 0.5rem;
}

.btn:hover { background: var(--primary-hover); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

#login-error {
  color: var(--error);
  font-size: 0.8rem;
  margin-top: 0.75rem;
  display: none;
}

/* ── Chat ── */
#chat-screen {
  display: none;
  flex-direction: column;
  height: 100dvh;
}

.chat-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.75rem 1rem;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.chat-header h2 {
  font-size: 1rem;
  font-weight: 600;
}

.chat-header .user-info {
  display: flex;
  align-items: center;
  gap: 0.75rem;
}

.chat-header .email {
  font-size: 0.8rem;
  color: var(--text-dim);
}

#logout-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 0.35rem 0.7rem;
  border-radius: 6px;
  cursor: pointer;
  font-size: 0.8rem;
  transition: all 0.2s;
}

#logout-btn:hover {
  border-color: var(--error);
  color: var(--error);
}

#messages {
  flex: 1;
  overflow-y: auto;
  padding: 1rem;
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
}

.msg {
  max-width: 85%;
  padding: 0.75rem 1rem;
  border-radius: 12px;
  font-size: 0.9rem;
  line-height: 1.55;
  white-space: pre-wrap;
  word-wrap: break-word;
}

.msg.user {
  align-self: flex-end;
  background: var(--user-bg);
  border-bottom-right-radius: 4px;
}

.msg.assistant {
  align-self: flex-start;
  background: var(--assistant-bg);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
}

.msg.assistant h1, .msg.assistant h2, .msg.assistant h3 {
  font-size: 1em;
  font-weight: 700;
  margin: 0.6em 0 0.3em;
}

.msg.assistant h1:first-child, .msg.assistant h2:first-child, .msg.assistant h3:first-child {
  margin-top: 0;
}

.msg.assistant ul, .msg.assistant ol {
  padding-left: 1.4em;
  margin: 0.3em 0;
}

.msg.assistant strong { color: #a29bfe; }

.msg.error {
  align-self: center;
  background: none;
  color: var(--error);
  font-size: 0.8rem;
}

.typing {
  align-self: flex-start;
  color: var(--text-dim);
  font-size: 0.85rem;
  padding: 0.5rem 0;
}

.typing span {
  animation: blink 1.4s infinite;
}
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }

@keyframes blink {
  0%, 60%, 100% { opacity: 0.2; }
  30% { opacity: 1; }
}

.input-bar {
  display: flex;
  gap: 0.5rem;
  padding: 0.75rem 1rem;
  background: var(--surface);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}

#msg-input {
  flex: 1;
  padding: 0.65rem 0.75rem;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-size: 0.95rem;
  outline: none;
  resize: none;
  font-family: inherit;
  min-height: 42px;
  max-height: 120px;
}

#msg-input:focus { border-color: var(--primary); }

#send-btn {
  padding: 0 1rem;
  background: var(--primary);
  color: #fff;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 1.1rem;
  transition: background 0.2s;
  flex-shrink: 0;
}

#send-btn:hover { background: var(--primary-hover); }
#send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* ── Scrollbar ── */
#messages::-webkit-scrollbar { width: 6px; }
#messages::-webkit-scrollbar-track { background: transparent; }
#messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ── Mobile ── */
@media (max-width: 600px) {
  .msg { max-width: 92%; }
  .chat-header .email { display: none; }
}
</style>
</head>
<body>

<!-- Login -->
<div id="login-screen">
  <div class="login-card">
    <h1>OpenClaw</h1>
    <p>API Test Interface</p>
    <div class="tabs">
      <button class="active" onclick="switchTab('login')">Login</button>
      <button onclick="switchTab('register')">Registrieren</button>
    </div>
    <form id="auth-form" onsubmit="return handleAuth(event)">
      <div class="field">
        <label for="email">E-Mail</label>
        <input type="email" id="email" required autocomplete="email">
      </div>
      <div class="field">
        <label for="password">Passwort</label>
        <input type="password" id="password" required minlength="8" autocomplete="current-password">
      </div>
      <button type="submit" class="btn" id="auth-btn">Einloggen</button>
    </form>
    <div id="login-error"></div>
  </div>
</div>

<!-- Chat -->
<div id="chat-screen">
  <div class="chat-header">
    <h2>OpenClaw</h2>
    <div class="user-info">
      <span class="email" id="user-email"></span>
      <button id="logout-btn" onclick="logout()">Logout</button>
    </div>
  </div>
  <div id="messages"></div>
  <div class="input-bar">
    <textarea id="msg-input" rows="1" placeholder="Nachricht eingeben..." onkeydown="handleKey(event)"></textarea>
    <button id="send-btn" onclick="sendMessage()">&#9654;</button>
  </div>
</div>

<script>
const API = window.location.origin;
let token = null;
let authMode = 'login';
let sending = false;

// ── Auth ──

function switchTab(mode) {
  authMode = mode;
  document.querySelectorAll('.tabs button').forEach((b, i) => {
    b.classList.toggle('active', (i === 0 && mode === 'login') || (i === 1 && mode === 'register'));
  });
  document.getElementById('auth-btn').textContent = mode === 'login' ? 'Einloggen' : 'Registrieren';
  hideError();
}

function showError(msg) {
  const el = document.getElementById('login-error');
  el.textContent = msg;
  el.style.display = 'block';
}

function hideError() {
  document.getElementById('login-error').style.display = 'none';
}

async function handleAuth(e) {
  e.preventDefault();
  hideError();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('auth-btn');

  btn.disabled = true;
  try {
    const endpoint = authMode === 'login' ? '/api/login' : '/api/register';
    const res = await fetch(API + endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Anfrage fehlgeschlagen');

    token = data.token;
    sessionStorage.setItem('token', token);
    sessionStorage.setItem('email', email);
    enterChat(email);
  } catch (err) {
    showError(err.message);
  } finally {
    btn.disabled = false;
  }
}

function enterChat(email) {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('chat-screen').style.display = 'flex';
  document.getElementById('user-email').textContent = email;
  document.getElementById('msg-input').focus();
  loadHistory();
}

function logout() {
  token = null;
  sessionStorage.clear();
  document.getElementById('messages').innerHTML = '';
  document.getElementById('chat-screen').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('email').value = '';
  document.getElementById('password').value = '';
}

// ── Session restore ──
(function restore() {
  const t = sessionStorage.getItem('token');
  const e = sessionStorage.getItem('email');
  if (t && e) {
    token = t;
    enterChat(e);
  }
})();

// ── Chat ──

async function loadHistory() {
  try {
    const res = await fetch(API + '/api/history', {
      headers: { 'Authorization': 'Bearer ' + token },
    });
    if (!res.ok) return;
    const data = await res.json();
    const container = document.getElementById('messages');
    container.innerHTML = '';
    (data.messages || []).forEach(m => appendMessage(m.role, m.message));
    scrollDown();
  } catch (_) {}
}

function appendMessage(role, text) {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ' + role;

  if (role === 'assistant') {
    div.innerHTML = renderMarkdown(text);
  } else {
    div.textContent = text;
  }

  container.appendChild(div);
  return div;
}

function renderMarkdown(text) {
  return text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>')
    .replace(/\n{2,}/g, '<br><br>')
    .replace(/\n/g, '<br>');
}

function showTyping() {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'typing';
  div.id = 'typing-indicator';
  div.innerHTML = '<span>.</span><span>.</span><span>.</span>';
  container.appendChild(div);
  scrollDown();
}

function hideTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

function scrollDown() {
  const c = document.getElementById('messages');
  c.scrollTop = c.scrollHeight;
}

async function sendMessage() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text || sending) return;

  sending = true;
  document.getElementById('send-btn').disabled = true;
  input.value = '';
  input.style.height = 'auto';

  appendMessage('user', text);
  scrollDown();
  showTyping();

  try {
    const res = await fetch(API + '/api/chat', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + token,
      },
      body: JSON.stringify({ message: text }),
    });

    hideTyping();
    const data = await res.json();

    if (!res.ok) {
      if (res.status === 401) { logout(); return; }
      throw new Error(data.error || 'Fehler');
    }

    appendMessage('assistant', data.response);
  } catch (err) {
    hideTyping();
    const div = document.createElement('div');
    div.className = 'msg error';
    div.textContent = 'Fehler: ' + err.message;
    document.getElementById('messages').appendChild(div);
  } finally {
    sending = false;
    document.getElementById('send-btn').disabled = false;
    scrollDown();
    input.focus();
  }
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
  // Auto-resize textarea
  requestAnimationFrame(() => {
    e.target.style.height = 'auto';
    e.target.style.height = Math.min(e.target.scrollHeight, 120) + 'px';
  });
}
</script>
</body>
</html>
